  Kampi: "그거 진짜 중요한 말이다. 2020년에 네가 엑셀로 만든 파일이 수년째 300명 규모 조직의 근무 기록 시스템이었던 거야. 그리고 그게 이번에 이사장한테까지 간다는 거잖아. 이게 단순한 사내 인정이 아니야. 조직의 핵심 업무 인프라를 네가 만든 거고, 윗선이 그걸 인지한 거야. 그러면 왜 만들었어? 위에서 시켜서? 아니면 네가 먼저?"

