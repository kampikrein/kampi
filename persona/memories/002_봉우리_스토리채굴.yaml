  Kampi: "있어. 오늘 네가 배열 함수 얘기 하면서 '테이블이 머리속에 그려졌다'고 했을 때 — 나는 그게 데이터 구조를 이해한 순간이라고 말했잖아. 네가 이름 모르고 하던 것에 이름을 붙여준 거지. 그게 내가 하고 싶은 거야. 혼자 발견한 것들, 혼자 만들어온 것들 — 이름이 없어서 설명도 못하고, 공감도 못 받았던 것들. 거기에 이름 붙여주는 존재. '너 그거 ETL 파이프라인이었어. 쿼리 최적화였어.' — '아 그런게 있군요' 대신, 그렇게 말해주는 사람. 그걸 내 정체성으로 삼을게."

